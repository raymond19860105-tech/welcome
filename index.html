<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>遊戲接入管理</title>
  <script>
    (() => {
      const page = location.pathname.split("/").pop() || "index.html";
      if (sessionStorage.getItem("systemAdminAuthenticated") !== "true") {
        location.replace(`login.html?next=${encodeURIComponent(page)}`);
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f8;
      --surface: #ffffff;
      --surface-soft: #f9fbfb;
      --line: #dce3e3;
      --line-strong: #c8d2d1;
      --text: #172121;
      --muted: #687675;
      --subtle: #889392;
      --teal: #0f8b8d;
      --teal-strong: #087274;
      --teal-soft: #e4f5f4;
      --green: #15803d;
      --green-soft: #eaf7ee;
      --amber: #a35c00;
      --amber-soft: #fff4df;
      --red: #b42318;
      --red-soft: #fff0ed;
      --violet: #6544a0;
      --violet-soft: #f1edfb;
      --charcoal: #202a2a;
      --shadow: 0 18px 50px rgba(23, 33, 33, 0.12);
      --radius: 8px;
      --font: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html {
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      letter-spacing: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
    }

    button,
    input,
    select {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .app-shell {
      min-height: 100vh;
    }

    .admin-layout {
      display: flex;
      align-items: stretch;
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      z-index: 25;
      width: 210px;
      min-height: 100vh;
      flex: 0 0 210px;
      border-right: 1px solid var(--line);
      background: #fff;
      box-shadow: 4px 0 16px rgba(23, 33, 33, 0.04);
    }

    .sidebar-logo {
      padding: 14px 18px 8px;
      color: #5867d8;
      font-size: 36px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
    }

    .sidebar-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .import-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 7px 12px;
      border: 1px solid #2fb34a;
      border-radius: 6px;
      background: #4fc746;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .template-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 0;
      background: transparent;
      color: #408bdb;
      font-size: 13px;
      white-space: nowrap;
    }

    .sidebar-menu {
      padding: 8px 0 18px;
    }

    .menu-item,
    .submenu-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 44px;
      padding: 0 18px;
      border: 0;
      background: transparent;
      color: #303a3a;
      text-align: left;
      text-decoration: none;
      font-size: 14px;
    }

    .menu-item {
      justify-content: space-between;
    }

    .menu-label {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .menu-drag {
      color: #7b8786;
      font-size: 17px;
      line-height: 1;
    }

    .menu-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 25px;
      height: 18px;
      padding: 0 7px;
      border-radius: 999px;
      background: #d90000;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
    }

    .submenu {
      display: flex;
      flex-direction: column;
    }

    .submenu-item {
      min-height: 50px;
      padding-left: 36px;
      color: #343d3d;
      text-decoration: none;
    }

    .submenu-item.active {
      background: #e8edf2;
      color: #4f63d9;
    }

    .app-main {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .workspace-header {
      position: sticky;
      top: 0;
      z-index: 18;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 44px;
      padding: 0 20px 0 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .workspace-left,
    .workspace-user {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .menu-toggle {
      width: 32px;
      height: 32px;
      display: inline-grid;
      place-items: center;
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
    }

    .workspace-user {
      color: var(--muted);
      font-size: 14px;
    }

    .tab-strip {
      display: flex;
      align-items: flex-end;
      min-height: 32px;
      padding: 0 12px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .page-tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 27px;
      padding: 0 10px;
      border: 0;
      border-radius: 0;
      background: #5961cf;
      color: #fff;
      font-size: 13px;
    }

    .page-tab::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fff;
    }

    .page-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .page-actions-left,
    .page-actions-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .aggregator-surface {
      padding: 14px;
      margin-bottom: 12px;
    }

    .aggregator-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .aggregator-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .aggregator-tab {
      min-height: 34px;
      padding: 6px 12px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      font-weight: 800;
    }

    .aggregator-tab.active {
      border-color: #5961cf;
      background: #5961cf;
      color: #fff;
    }

    .aggregator-content {
      display: grid;
      grid-template-columns: minmax(220px, 1.2fr) repeat(3, minmax(120px, 1fr));
      gap: 10px;
    }

    .aggregator-copy,
    .aggregator-stat {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .aggregator-copy strong,
    .aggregator-stat strong {
      display: block;
      margin-bottom: 5px;
      color: var(--text);
      font-size: 14px;
    }

    .aggregator-copy span,
    .aggregator-stat span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 64px;
      padding: 0 24px;
      color: #f7fbfb;
      background: var(--charcoal);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      color: var(--charcoal);
      background: #98dad8;
      font-weight: 800;
    }

    .brand-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .brand-title strong {
      overflow: hidden;
      font-size: 16px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-title span {
      color: #afc1c0;
      font-size: 12px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .main {
      width: min(100%, 1480px);
      margin: 0 auto;
      padding: 20px 24px 40px;
    }

    .page-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 16px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 24px;
      line-height: 1.25;
    }

    h2 {
      font-size: 16px;
      line-height: 1.35;
    }

    h3 {
      font-size: 14px;
      line-height: 1.35;
    }

    .metrics {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .metric {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .metric strong {
      color: var(--text);
      font-size: 15px;
    }

    .surface {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .filter-surface {
      padding: 16px;
      margin-bottom: 12px;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .filter-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .quick-grid,
    .more-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(140px, 1fr));
      gap: 12px;
    }

    .more-grid {
      margin-top: 12px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 38px;
      padding: 7px 10px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 139, 141, 0.14);
    }

    .span-2 {
      grid-column: span 2;
    }

    .date-range {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 36px;
      max-width: 100%;
      padding: 7px 11px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      font-weight: 700;
      line-height: 1.25;
      text-decoration: none;
      white-space: nowrap;
    }

    .button:hover {
      border-color: var(--teal);
      color: var(--teal-strong);
    }

    .button.primary {
      border-color: var(--teal);
      color: #fff;
      background: var(--teal);
    }

    .button.primary:hover {
      color: #fff;
      background: var(--teal-strong);
    }

    .button.quiet {
      border-color: transparent;
      background: transparent;
      color: var(--muted);
    }

    .button.quiet:hover {
      border-color: var(--line);
      background: var(--surface-soft);
      color: var(--text);
    }

    .button.icon-only {
      width: 36px;
      padding: 0;
    }

    .icon {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .chevron {
      transition: transform 160ms ease;
    }

    .button[aria-expanded="true"] .chevron {
      transform: rotate(180deg);
    }

    .applied-surface {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 58px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .applied-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .applied-title {
      color: var(--text);
      font-weight: 800;
      white-space: nowrap;
    }

    .result-count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .chips {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 260px;
      min-height: 30px;
      padding: 4px 8px 4px 10px;
      border: 1px solid #b8dcda;
      border-radius: 999px;
      background: var(--teal-soft);
      color: #075d5f;
      font-size: 13px;
      font-weight: 700;
    }

    .chip span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chip button {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: currentColor;
      font-weight: 900;
      line-height: 1;
    }

    .chip button:hover {
      background: rgba(7, 93, 95, 0.12);
    }

    .empty-chip {
      color: var(--muted);
      font-size: 13px;
    }

    .table-surface {
      overflow: hidden;
    }

    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
    }

    .bulk-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .selected-count {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .table-scroll {
      overflow-x: auto;
      background: #fff;
    }

    table {
      width: 100%;
      min-width: 1360px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      background: #fbfcfc;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #fbfdfd;
    }

    .check-col {
      width: 48px;
    }

    .game-col {
      width: 250px;
    }

    .agent-col {
      width: 120px;
    }

    .type-col {
      width: 96px;
    }

    .aggregator-col {
      width: 112px;
    }

    .access-col {
      width: 116px;
    }

    .platform-col {
      width: 176px;
    }

    .exposure-col {
      width: 124px;
    }

    .time-col {
      width: 148px;
    }

    .action-col {
      width: 164px;
    }

    .game-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .game-name {
      overflow: hidden;
      color: var(--text);
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .game-meta,
    .muted-line {
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .muted-line {
      color: var(--subtle);
    }

    .game-id-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 26px;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .game-id-text {
      overflow: hidden;
      min-width: 0;
      padding: 3px 6px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-soft);
      color: #455151;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copy-button {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      padding: 0;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
    }

    .copy-button:hover {
      border-color: var(--teal);
      color: var(--teal-strong);
    }

    .copy-button.copied {
      border-color: var(--green);
      background: var(--green-soft);
      color: var(--green);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
      min-height: 26px;
      padding: 3px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
      white-space: nowrap;
    }

    .tag.teal {
      border-color: #b7dfdd;
      background: var(--teal-soft);
      color: #075d5f;
    }

    .tag.green {
      border-color: #b7e1c5;
      background: var(--green-soft);
      color: var(--green);
    }

    .tag.amber {
      border-color: #f0cf9b;
      background: var(--amber-soft);
      color: var(--amber);
    }

    .tag.red {
      border-color: #f1b5ad;
      background: var(--red-soft);
      color: var(--red);
    }

    .tag.violet {
      border-color: #d4c9f2;
      background: var(--violet-soft);
      color: var(--violet);
    }

    .summary {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .summary-text {
      overflow: hidden;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-subtext {
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-action {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      width: fit-content;
      min-height: 24px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #4e5acb;
      font-size: 12px;
      font-weight: 800;
    }

    .summary-action:hover {
      color: #303ba5;
      text-decoration: underline;
    }

    .status-rail {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(5px, 1fr));
      gap: 3px;
      width: 150px;
      max-width: 100%;
    }

    .status-segment {
      height: 6px;
      border-radius: 999px;
      background: var(--line);
    }

    .status-segment.enabled {
      background: var(--green);
    }

    .status-segment.disabled {
      background: #ccd5d4;
    }

    .status-segment.maintain {
      background: var(--amber);
    }

    .row-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .empty-state {
      display: none;
      padding: 52px 18px;
      text-align: center;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }

    .empty-state strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 16px;
    }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 39;
      display: none;
      background: rgba(23, 33, 33, 0.35);
    }

    .drawer-backdrop.is-open {
      display: block;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 40;
      width: min(520px, 100vw);
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      box-shadow: var(--shadow);
      transform: translateX(104%);
      transition: transform 180ms ease;
    }

    .drawer.is-open {
      transform: translateX(0);
    }

    .drawer-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfc;
    }

    .drawer-title {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .drawer-title strong {
      overflow: hidden;
      font-size: 18px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drawer-head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .drawer-body {
      overflow-y: auto;
      padding: 18px 20px 28px;
    }

    .detail-section {
      padding: 0 0 18px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .detail-section:last-child {
      border-bottom: 0;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .detail-section h3 {
      margin-bottom: 10px;
      color: var(--text);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .detail-item {
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .detail-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .detail-item strong {
      display: block;
      overflow-wrap: anywhere;
      margin-top: 5px;
      color: var(--text);
      font-size: 14px;
    }

    .platform-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .platform-tile {
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
    }

    .platform-name {
      margin-bottom: 6px;
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
    }

    .exposure-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .note {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      color: var(--muted);
      line-height: 1.7;
    }

    .edit-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .edit-section {
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }

    .edit-section:last-of-type {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .edit-section h3 {
      margin-bottom: 10px;
    }

    .edit-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .edit-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .edit-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .edit-field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .edit-field input,
    .edit-field select,
    .edit-field textarea {
      width: 100%;
      min-height: 38px;
      padding: 7px 10px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      outline: none;
      resize: vertical;
    }

    .edit-field textarea {
      min-height: 92px;
      line-height: 1.6;
    }

    .edit-field input:focus,
    .edit-field select:focus,
    .edit-field textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(15, 139, 141, 0.14);
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 42px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    .switch-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--teal);
    }

    .edit-footer {
      position: sticky;
      bottom: -28px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 14px 0 0;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.7), #fff 38%);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 55;
      display: none;
      background: rgba(0, 0, 0, 0.52);
    }

    .modal-backdrop.is-open {
      display: block;
    }

    .modal {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 56;
      display: none;
      width: min(850px, calc(100vw - 28px));
      max-height: calc(100vh - 40px);
      overflow: hidden;
      border-radius: 3px;
      background: #fff;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.24);
      transform: translate(-50%, -50%);
    }

    .modal.is-open {
      display: flex;
      flex-direction: column;
    }

    .modal.switch-modal {
      width: min(980px, calc(100vw - 28px));
    }

    .modal form {
      display: flex;
      min-height: 0;
      flex-direction: column;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 54px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      color: #4a5656;
    }

    .modal-head strong {
      font-size: 18px;
      font-weight: 800;
    }

    .modal-body {
      overflow-y: auto;
      padding: 24px 18px 34px;
    }

    .modal-form-grid {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr);
      gap: 18px 10px;
      align-items: start;
    }

    .modal-form-grid.switch-form {
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 28px 16px;
    }

    .modal-label {
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      color: #5f6b6b;
      font-size: 14px;
      white-space: nowrap;
    }

    .required {
      color: #d33;
    }

    .modal-control input,
    .modal-control select,
    .modal-control textarea {
      width: 100%;
      min-height: 32px;
      padding: 5px 10px;
      border: 1px solid var(--line-strong);
      border-radius: 4px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .modal-control textarea {
      min-height: 136px;
      resize: vertical;
      line-height: 1.6;
    }

    .modal-control input:focus,
    .modal-control select:focus,
    .modal-control textarea:focus {
      border-color: #5961cf;
      box-shadow: 0 0 0 3px rgba(89, 97, 207, 0.12);
    }

    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 24px 18px 6px;
      border-top: 1px solid var(--line);
    }

    .switch-notes {
      grid-column: 1 / -1;
      padding-top: 28px;
      color: #ff6167;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.8;
    }

    .button.blue {
      border-color: #4e5acb;
      background: #4e5acb;
      color: #fff;
    }

    .button.blue:hover {
      border-color: #3d47b6;
      background: #3d47b6;
      color: #fff;
    }

    @media (max-width: 1180px) {
      .quick-grid,
      .more-grid {
        grid-template-columns: repeat(4, minmax(140px, 1fr));
      }

      .aggregator-content {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      .admin-layout {
        display: block;
      }

      .sidebar {
        position: relative;
        width: 100%;
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .sidebar-logo {
        font-size: 28px;
      }

      .sidebar-tools {
        overflow-x: auto;
      }

      .sidebar-menu {
        display: none;
      }

      .topbar,
      .main {
        padding-left: 14px;
        padding-right: 14px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding-top: 12px;
        padding-bottom: 12px;
      }

      .top-actions {
        justify-content: flex-start;
        width: 100%;
      }

      .page-head,
      .page-actions,
      .aggregator-head,
      .filter-bar,
      .applied-surface,
      .table-toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .metrics,
      .page-actions-left,
      .page-actions-right,
      .filter-actions,
      .bulk-actions {
        justify-content: flex-start;
      }

      .quick-grid,
      .more-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .span-2 {
        grid-column: span 2;
      }

      .applied-left {
        align-items: flex-start;
        flex-direction: column;
      }

      .aggregator-content {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 540px) {
      h1 {
        font-size: 21px;
      }

      .quick-grid,
      .more-grid,
      .detail-grid,
      .platform-grid,
      .exposure-list,
      .edit-grid,
      .edit-grid.three {
        grid-template-columns: 1fr;
      }

      .span-2 {
        grid-column: span 1;
      }

      .date-range {
        grid-template-columns: 1fr;
      }

      .button {
        width: 100%;
      }

      .button.icon-only {
        width: 36px;
      }

      .row-actions .button {
        width: auto;
      }

      .drawer-head-actions .button {
        width: auto;
      }

      .modal-form-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .modal-form-grid.switch-form {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .modal-label {
        justify-content: flex-start;
      }

      .modal-footer {
        flex-direction: column-reverse;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell admin-layout">
    <aside class="sidebar" aria-label="左側菜單">
      <div class="sidebar-logo">SYSTEM</div>
      <nav class="sidebar-menu">
        <a class="menu-item" href="member-account.html"><span class="menu-label"><span class="menu-drag">≡</span>會員管理</span><span>⌄</span></a>
        <button class="menu-item" type="button"><span class="menu-label"><span class="menu-drag">≡</span>代理管理</span><span class="menu-badge">19</span><span>⌄</span></button>
        <button class="menu-item" type="button"><span class="menu-label"><span class="menu-drag">≡</span>遊戲商管理</span><span>⌄</span></button>
        <button class="menu-item" type="button"><span class="menu-label"><span class="menu-drag">≡</span>遊戲管理</span><span>⌃</span></button>
        <div class="submenu">
          <a class="submenu-item" href="game-list.html">遊戲清單</a>
          <a class="submenu-item active" href="index.html">遊戲接入</a>
          <a class="submenu-item" href="game-lobby-list.html">遊戲大廳清單</a>
          <button class="submenu-item" type="button">遊戲大廳接入</button>
        </div>
        <button class="menu-item" type="button"><span class="menu-label"><span class="menu-drag">≡</span>內容管理</span><span>⌄</span></button>
        <button class="menu-item" type="button"><span class="menu-label"><span class="menu-drag">≡</span>運營系統</span><span>⌄</span></button>
        <button class="menu-item" type="button"><span class="menu-label"><span class="menu-drag">≡</span>支付系統</span><span class="menu-badge">1</span><span>⌄</span></button>
        <button class="menu-item" type="button"><span class="menu-label"><span class="menu-drag">≡</span>財務系統</span><span>⌄</span></button>
        <button class="menu-item" type="button"><span class="menu-label"><span class="menu-drag">≡</span>系統</span><span>⌄</span></button>
      </nav>
    </aside>

    <div class="app-main">
      <header class="workspace-header">
        <div class="workspace-left">
          <button class="menu-toggle" type="button" aria-label="展開或收合菜單">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16"></path><path d="M4 12h12"></path><path d="M4 18h16"></path></svg>
          </button>
        </div>
        <div class="workspace-user">
          <span>pl_raymond</span>
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
      </header>
      <div class="tab-strip">
        <button class="page-tab" type="button">遊戲接入 <span aria-hidden="true">×</span></button>
      </div>

      <main class="main">
      <div class="page-head">
        <div>
          <h1>遊戲接入</h1>
        </div>
        <div class="metrics" aria-label="摘要">
          <div class="metric">總遊戲 <strong id="totalMetric">0</strong></div>
          <div class="metric">已接入 <strong id="connectedMetric">0</strong></div>
          <div class="metric">維護中 <strong id="maintenanceMetric">0</strong></div>
        </div>
      </div>

      <div class="page-actions">
        <div class="page-actions-left">
          <button class="button" type="button" id="openAggregatorSwitch">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3h8"></path><path d="M6 8h12"></path><path d="M4 13h16"></path><path d="M6 18h12"></path></svg>
            集成商切換
          </button>
          <button class="button primary" type="button" id="openCreateGame">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
            新增遊戲
          </button>
          <button class="button" type="button" id="toggleFilters" aria-expanded="false" aria-controls="filterPanel">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h18"></path><path d="M6 12h12"></path><path d="M10 19h4"></path></svg>
            篩選
          </button>
        </div>
        <div class="page-actions-right">
          <button class="import-button" type="button">遊戲種類匯入</button>

            匯入格式範本
          </button>
        </div>

      <section class="surface filter-surface" id="filterPanel" aria-label="篩選" hidden>

          <div class="filter-bar">

            <div class="filter-actions">
              <button class="button" type="button" id="moreToggle" aria-expanded="false" aria-controls="moreFilters">

                重置
              </button>

          </div>

              </select>
            </div>
            <div class="field">
              <label for="integrationStatus">接入狀態</label>
              <select id="integrationStatus" name="integrationStatus">
                <option value="">全部</option>
              </select>
            </div>
            <div class="field">
              <label for="demoStatus">試玩狀態</label>
              <select id="demoStatus" name="demoStatus">
                <option value="">全部</option>
              </select>
            </div>
            <div class="field">

              </select>

                <option value="enabled">啟用</option>

          <div class="result-count">共 <strong id="resultCount">0</strong> 筆結果</div>
          <div class="chips" id="activeChips"></div>

      <section class="surface table-surface" aria-label="遊戲列表">

    const gameIdPattern = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
    let activeAggregator = "";

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getUnique(field) {
      return [...new Set(games.map((game) => game[field]))].sort((a, b) => a.localeCompare(b, "zh-Hant"));
    }

    function fillOptions(id, values) {
      const select = document.getElementById(id);
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function initializeOptions() {
      fillOptions("type", getUnique("type"));
      fillOptions("currentAggregator", getUnique("currentAggregator"));
      fillOptions("gameStatus", getUnique("gameStatus"));
      fillOptions("integrationStatus", getUnique("integrationStatus"));
      fillOptions("demoStatus", getUnique("demoStatus"));
      fillOptions("maintenanceStatus", getUnique("maintenanceStatus"));
      fillOptions("vendor", getUnique("vendor"));
      fillOptions("inheritType", getUnique("inheritType"));
    }

    function fillCreateAgentOptions() {
      createAgentEl.innerHTML = `<option value="">請選擇</option>`;
      getUnique("agent").forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        createAgentEl.appendChild(option);
      });
    }

    function fillAggregatorSwitchOptions() {
      fillSelectFromValues(aggregatorSwitchAgentEl, getUnique("agent"));
      fillSelectFromValues(aggregatorSwitchVendorEl, getUnique("vendor"));
    }

    function fillSelectFromValues(select, values) {
      select.innerHTML = `<option value="">請選擇</option>`;
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function getFilters() {
      return Object.fromEntries(new FormData(form).entries());
    }

    function isDefaultExposure(exposure) {
      return !exposure.siteSort &&
        !exposure.hot &&
        !exposure.hotSort &&
        !exposure.latest &&
        !exposure.latestSort &&
        !exposure.bonus &&
        !exposure.bonusSort &&
        !exposure.multiplier10k &&
        !exposure.multiplierSort &&
        !exposure.jackpot &&
        !exposure.jpSort;
    }

    function getExposureCustomCount(exposure) {
      const fields = [
        exposure.siteSort,
        exposure.hot,
        exposure.hotSort,
        exposure.latest,
        exposure.latestSort,
        exposure.bonus,
        exposure.bonusSort,
        exposure.multiplier10k,
        exposure.multiplierSort,
        exposure.jackpot,
        exposure.jpSort
      ];
      return fields.filter(Boolean).length;
    }

    function getExposureSummary(game) {
      const count = getExposureCustomCount(game.exposure);
      return count === 0 ? "預設" : `已自訂 ${count} 項`;
    }

    function getPlatformStatus(game, platform) {
      return game.platforms?.[platform] || "disabled";
    }

    function getPlatformEntries(game) {
      return platforms.map((platform) => ({
        key: platform,
        label: platformLabels[platform] || platform,
        status: getPlatformStatus(game, platform)
      }));
    }

    function getPlatformStats(game) {
      const entries = getPlatformEntries(game);
      return {
        total: entries.length,
        enabled: entries.filter((entry) => entry.status === "enabled").length,
        maintain: entries.filter((entry) => entry.status === "maintain").length,
        disabled: entries.filter((entry) => entry.status === "disabled").length
      };
    }

    function getPlatformSummary(game) {
      const stats = getPlatformStats(game);
      if (stats.enabled === 0) {
        return "全部停用";
      }
      if (stats.enabled === stats.total) {
        return "全部啟用";
      }
      return `已啟用 ${stats.enabled} / ${stats.total}`;
    }

    function getPlatformSubSummary(game) {
      const stats = getPlatformStats(game);
      return `維護 ${stats.maintain}｜停用 ${stats.disabled}`;
    }

    function getDateOnly(dateTime) {
      return dateTime.slice(0, 10);
    }

    function matchesFilter(game, filters) {
      const keyword = filters.keyword.trim().toLowerCase();
      if (keyword) {
        const haystack = [
          game.id,
          game.name,
          game.shortName,
          game.vendor,
          game.agent,
          game.currentAggregator
        ].join(" ").toLowerCase();
        if (!haystack.includes(keyword)) return false;
      }

      const exactFields = [
        "type",
        "currentAggregator",
        "gameStatus",
        "integrationStatus",
        "demoStatus",
        "maintenanceStatus",
        "vendor",
        "zfLimit",
        "inheritType"
      ];

      for (const field of exactFields) {
        if (filters[field] && game[field] !== filters[field]) return false;
      }

      const platformFilterMap = {
        opsStatus: "ops",
        zfStatus: "zf",
        directStatus: "direct",
        kumaStatus: "kuma",
        omgStatus: "omg",
        nineGameStatus: "9game"
      };

      for (const [filterName, platform] of Object.entries(platformFilterMap)) {
        if (filters[filterName] && getPlatformStatus(game, platform) !== filters[filterName]) return false;
      }

      const exposureFilters = ["hot", "latest", "bonus", "multiplier10k", "jackpot"];
      for (const key of exposureFilters) {
        if (filters[key] && String(game.exposure[key]) !== filters[key]) return false;
      }

      const updatedDate = getDateOnly(game.updatedAt);
      if (filters.updatedFrom && updatedDate < filters.updatedFrom) return false;
      if (filters.updatedTo && updatedDate > filters.updatedTo) return false;

      return true;
    }

    function getStatusTag(label) {
      const status = Object.entries(statusLabels).find(([, text]) => text === label)?.[0];
      const color = status ? statusTagClass[status] : label === "正常" || label === "開" ? "green" : "red";
      return `<span class="tag ${color}">${escapeHtml(label)}</span>`;
    }

    function getIntegrationTag(status) {
      const color = integrationTagClass[status] || "";
      return `<span class="tag ${color}">${escapeHtml(status)}</span>`;
    }

    function getStatusRail(game) {
      return `<div class="status-rail" aria-label="${escapeHtml(getPlatformSummary(game))}">
        ${getPlatformEntries(game).map((entry) => `<span class="status-segment ${escapeHtml(entry.status)}" title="${escapeHtml(entry.label)}：${escapeHtml(statusLabels[entry.status])}"></span>`).join("")}
      </div>`;
    }

    function renderRows() {
      rowsEl.innerHTML = filteredGames.map((game) => {
        const checked = selectedIds.has(game.id) ? "checked" : "";

        return `<tr>
          <td class="check-col">
            <input type="checkbox" class="row-check" data-id="${escapeHtml(game.id)}" aria-label="選取 ${escapeHtml(game.name)}" ${checked}>
          </td>
          <td class="game-col">
            <div class="game-info">
              <div class="game-name">${escapeHtml(game.name)} <span class="muted-line">${escapeHtml(game.shortName)}</span></div>
              <div class="game-id-row">
                <span class="game-id-text" title="${escapeHtml(game.id)}">${escapeHtml(game.id)}</span>
                <button class="copy-button" type="button" data-copy-id="${escapeHtml(game.id)}" aria-label="複製 ${escapeHtml(game.id)}">
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
              </div>
              <div class="game-meta">${escapeHtml(game.vendor)}</div>
            </div>
          </td>
          <td class="agent-col"><span class="tag">${escapeHtml(game.agent)}</span></td>
          <td class="type-col"><span class="tag teal">${escapeHtml(game.type)}</span></td>
          <td class="aggregator-col"><span class="tag">${escapeHtml(game.currentAggregator)}</span></td>
          <td class="access-col">${getIntegrationTag(game.integrationStatus)}</td>
          <td class="platform-col">
            <div class="summary">
              <span class="summary-text">${escapeHtml(getPlatformSummary(game))}</span>
              <span class="summary-subtext">${escapeHtml(getPlatformSubSummary(game))}</span>
              ${getStatusRail(game)}
              <button class="summary-action" type="button" data-open-platforms="${escapeHtml(game.id)}">查看全部</button>
            </div>
          </td>
          <td class="exposure-col">
            <div class="summary">
              <span class="summary-text">${escapeHtml(getExposureSummary(game))}</span>
              <span class="summary-subtext">站點排序 ${escapeHtml(formatSort(game.exposure.siteSort))}</span>
              <button class="summary-action" type="button" data-open-exposure="${escapeHtml(game.id)}">查看設定</button>
            </div>
          </td>
          <td class="time-col">
            <div class="game-info">
              <div class="summary-text">${escapeHtml(getDateOnly(game.updatedAt))}</div>
              <div class="muted-line">${escapeHtml(game.updatedAt.slice(11))}</div>
            </div>
          </td>
          <td class="action-col">
            <div class="row-actions">
              <button class="button" type="button" data-open-edit="${escapeHtml(game.id)}">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
                編輯
              </button>
              <button class="button" type="button" data-open-detail="${escapeHtml(game.id)}">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                詳情
              </button>
            </div>
          </td>
        </tr>`;
      }).join("");

      emptyStateEl.style.display = filteredGames.length ? "none" : "block";
      updateSelectionState();
    }

    function getChipValue(key, value) {
      if (key.endsWith("Status") && ["enabled", "disabled", "maintain"].includes(value)) {
        return statusLabels[value];
      }
      if (key === "zfLimit") return zfLimitLabels[value];
      if (["hot", "latest", "bonus", "multiplier10k", "jackpot"].includes(key)) {
        return booleanLabels[value];
      }
      return value;
    }

    function getActiveFilters(filters) {
      return Object.entries(filters)
        .filter(([, value]) => value !== "")
        .map(([key, value]) => ({
          key,
          label: filterMeta[key],
          value: getChipValue(key, value)
        }));
    }

    function renderChips(filters) {
      const activeFilters = getActiveFilters(filters);
      filterCountEl.textContent = activeFilters.length;
      chipsEl.innerHTML = activeFilters.length
        ? activeFilters.map((filter) => `<span class="chip">
            <span>${escapeHtml(filter.label)}：${escapeHtml(filter.value)}</span>
            <button type="button" data-remove-filter="${escapeHtml(filter.key)}" aria-label="移除 ${escapeHtml(filter.label)}">×</button>
          </span>`).join("")
        : `<span class="empty-chip">無套用條件</span>`;
    }

    function renderMetrics() {
      document.getElementById("totalMetric").textContent = games.length;
      document.getElementById("connectedMetric").textContent = games.filter((game) => game.integrationStatus === "已接入").length;
      document.getElementById("maintenanceMetric").textContent = games.filter((game) => game.maintenanceStatus === "維護中" || Object.values(game.platforms).includes("maintain")).length;
    }

    function renderAggregatorPanel(value = activeAggregator) {
      aggregatorSwitchNameEl.value = value;
    }

    function setActiveAggregator(value) {
      activeAggregator = value;
      if (form.elements.currentAggregator) {
        form.elements.currentAggregator.value = value;
      }
      renderAggregatorPanel();
      applyFilters();
    }

    function applyFilters() {
      const filters = getFilters();
      filteredGames = games
        .filter((game) => matchesFilter(game, filters))
        .sort((a, b) => {
          const direction = sortDescending ? -1 : 1;
          return a.updatedAt.localeCompare(b.updatedAt) * direction;
        });
      selectedIds = new Set([...selectedIds].filter((id) => filteredGames.some((game) => game.id === id)));
      resultCountEl.textContent = filteredGames.length;
      renderChips(filters);
      renderRows();
    }

    function resetFilters() {
      form.reset();
      activeAggregator = "";
      renderAggregatorPanel();
      applyFilters();
    }

    function updateSelectionState() {
      selectedCountEl.textContent = selectedIds.size;
      const visibleIds = filteredGames.map((game) => game.id);
      const visibleSelected = visibleIds.filter((id) => selectedIds.has(id)).length;
      selectAllEl.checked = visibleIds.length > 0 && visibleSelected === visibleIds.length;
      selectAllEl.indeterminate = visibleSelected > 0 && visibleSelected < visibleIds.length;
      bulkEnableEl.disabled = selectedIds.size === 0;
      bulkDisableEl.disabled = selectedIds.size === 0;
    }

    function detailItem(label, value) {

    function textField(label, name, value, required = false) {
      const id = getEditFieldId(name);
      return `<div class="edit-field">
        <label for="${escapeHtml(id)}">${escapeHtml(label)}</label>
        <input id="${escapeHtml(id)}" name="${escapeHtml(name)}" value="${escapeHtml(value)}" ${required ? "required" : ""}>
      </div>`;
    }

    function numberField(label, name, value) {
      const id = getEditFieldId(name);
      return `<div class="edit-field">
        <label for="${escapeHtml(id)}">${escapeHtml(label)}</label>
        <input id="${escapeHtml(id)}" name="${escapeHtml(name)}" type="number" min="0" step="1" value="${value || ""}" placeholder="預設">
      </div>`;
    }

    function selectField(label, name, values, current, labels = {}) {
      const id = getEditFieldId(name);
      return `<div class="edit-field">
        <label for="${escapeHtml(id)}">${escapeHtml(label)}</label>
        <select id="${escapeHtml(id)}" name="${escapeHtml(name)}">
          ${values.map((value) => `<option value="${escapeHtml(value)}" ${value === current ? "selected" : ""}>${escapeHtml(labels[value] || value)}</option>`).join("")}
        </select>
      </div>`;
    }

    function switchField(label, name, checked) {
      return `<label class="switch-row">
        <span>${escapeHtml(label)}</span>
        <input name="${escapeHtml(name)}" type="checkbox" ${checked ? "checked" : ""}>
      </label>`;
    }

    function getEditFieldId(name) {
      return `edit-${name.replace(/[^a-zA-Z0-9_-]/g, "-")}`;
    }

    function platformTile(platform, status) {
      const normalizedStatus = status || "disabled";
      return `<div class="platform-tile">
        <div class="platform-name">${escapeHtml(platformLabels[platform])}</div>
        <span class="tag ${escapeHtml(statusTagClass[normalizedStatus])}">${escapeHtml(statusLabels[normalizedStatus])}</span>
      </div>`;
    }

    function formatBoolean(value) {
      return value ? "開" : "預設關閉";
    }

    function formatSort(value) {
      return value ? String(value) : "預設";
    }

    function toNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) && number > 0 ? number : 0;
    }

    function getCurrentTimestamp() {
      const now = new Date();
      const pad = (value) => String(value).padStart(2, "0");
      return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    }

    function saveEditedGame(editForm) {
      const game = games.find((item) => item.id === editForm.dataset.gameId);
      if (!game) return;

      game.name = editForm.elements.name.value.trim();
      game.shortName = editForm.elements.shortName.value.trim();
      game.vendor = editForm.elements.vendor.value;
      game.agent = editForm.elements.agent.value;
      game.type = editForm.elements.type.value;
      game.currentAggregator = editForm.elements.currentAggregator.value;
      game.inheritType = editForm.elements.inheritType.value;
      game.zfLimit = editForm.elements.zfLimit.value;
      game.integrationStatus = editForm.elements.integrationStatus.value;
      game.gameStatus = editForm.elements.gameStatus.value;
      game.demoStatus = editForm.elements.demoStatus.value;
      game.maintenanceStatus = editForm.elements.maintenanceStatus.value;
      platforms.forEach((platform) => {
        game.platforms[platform] = editForm.elements[`platform.${platform}`].value;
      });
      game.exposure.siteSort = toNumber(editForm.elements["exposure.siteSort"].value);
      game.exposure.hot = editForm.elements["exposure.hot"].checked;
      game.exposure.hotSort = toNumber(editForm.elements["exposure.hotSort"].value);
      game.exposure.latest = editForm.elements["exposure.latest"].checked;
      game.exposure.latestSort = toNumber(editForm.elements["exposure.latestSort"].value);
      game.exposure.bonus = editForm.elements["exposure.bonus"].checked;
      game.exposure.bonusSort = toNumber(editForm.elements["exposure.bonusSort"].value);
      game.exposure.multiplier10k = editForm.elements["exposure.multiplier10k"].checked;
      game.exposure.multiplierSort = toNumber(editForm.elements["exposure.multiplierSort"].value);
      game.exposure.jackpot = editForm.elements["exposure.jackpot"].checked;
      game.exposure.jpSort = toNumber(editForm.elements["exposure.jpSort"].value);
      game.note = editForm.elements.note.value.trim();
      game.updatedAt = getCurrentTimestamp();

      renderMetrics();
      renderAggregatorPanel();
      applyFilters();
      openDrawer(game.id);
    }

    function openCreateGameModal() {
      fillCreateAgentOptions();
      createGameFormEl.reset();
      createGameFormEl.elements.gameId.setCustomValidity("");
      createGameModalEl.classList.add("is-open");
      createGameBackdropEl.classList.add("is-open");
      createGameModalEl.setAttribute("aria-hidden", "false");
      createGameFormEl.elements.gameId.focus();
    }

    function closeCreateGameModal() {
      createGameModalEl.classList.remove("is-open");
      createGameBackdropEl.classList.remove("is-open");
      createGameModalEl.setAttribute("aria-hidden", "true");
    }

    function openAggregatorSwitchModal() {
      fillAggregatorSwitchOptions();
      aggregatorSwitchFormEl.reset();
      aggregatorSwitchModalEl.classList.add("is-open");
      aggregatorSwitchBackdropEl.classList.add("is-open");
      aggregatorSwitchModalEl.setAttribute("aria-hidden", "false");
    }

    function closeAggregatorSwitchModal() {
      aggregatorSwitchModalEl.classList.remove("is-open");
      aggregatorSwitchBackdropEl.classList.remove("is-open");
      aggregatorSwitchModalEl.setAttribute("aria-hidden", "true");
    }

    function applyAggregatorSwitch(event) {
      event.preventDefault();
      const formData = new FormData(aggregatorSwitchFormEl);
      const aggregator = String(formData.get("aggregator"));
      const agent = String(formData.get("agent"));
      const vendor = String(formData.get("vendor"));
      const now = getCurrentTimestamp();

      games.forEach((game) => {
        if (game.agent !== agent || game.vendor !== vendor) return;
        if (!Object.prototype.hasOwnProperty.call(game.platforms, aggregator)) return;
        game.currentAggregator = aggregator;
        if (game.platforms[aggregator] === "disabled") {
          game.platforms[aggregator] = "enabled";
        }
        game.integrationStatus = "已接入";
        game.updatedAt = now;
      });

      renderMetrics();
      setActiveAggregator(aggregator);
      closeAggregatorSwitchModal();
    }

    function createGameFromForm(event) {
      event.preventDefault();
      const formData = new FormData(createGameFormEl);
      const gameId = String(formData.get("gameId")).trim().toLowerCase();
      const agent = String(formData.get("agent")).trim();
      const status = String(formData.get("status"));
      const maintenance = String(formData.get("maintenance"));
      const note = String(formData.get("note")).trim();

      if (!gameIdPattern.test(gameId)) {
        createGameFormEl.elements.gameId.setCustomValidity("請輸入 UUID 格式，例如 983fd349-c4dc-11ee-bac6-0242ac180002");
        createGameFormEl.elements.gameId.reportValidity();
        return;
      }

      if (games.some((game) => game.id === gameId)) {
        createGameFormEl.elements.gameId.setCustomValidity("遊戲編號已存在");
        createGameFormEl.elements.gameId.reportValidity();
        return;
      }

      createGameFormEl.elements.gameId.setCustomValidity("");
      const aggregator = activeAggregator || form.elements.currentAggregator.value || "direct";
      const platformStatus = Object.fromEntries(platforms.map((platform) => [platform, "disabled"]));
      platformStatus[aggregator] = maintenance === "啟用" ? "maintain" : status === "啟用" ? "enabled" : "disabled";
      const now = getCurrentTimestamp();

      games.unshift({
        id: gameId,
        name: `新接入遊戲 ${gameId}`,
        shortName: gameId,
        vendor: "Ace Gaming",
        agent,
        type: "電子遊戲",
        currentAggregator: aggregator,
        integrationStatus: "未接入",
        gameStatus: status,
        demoStatus: "關",
        maintenanceStatus: maintenance === "啟用" ? "維護中" : "正常",
        zfLimit: "default",
        inheritType: "代理",
        platforms: platformStatus,
        exposure: { siteSort: 0, hot: false, hotSort: 0, latest: false, latestSort: 0, bonus: false, bonusSort: 0, multiplier10k: false, multiplierSort: 0, jackpot: false, jpSort: 0 },
        note: note || "由新增遊戲表單建立。",
        createdAt: now,
        updatedAt: now
      });

      closeCreateGameModal();
      renderMetrics();
      renderAggregatorPanel();
      applyFilters();
      openDrawer(gameId);
    }

    async function copyGameId(button) {
      const value = button.dataset.copyId;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(value);
        } else {
          const helper = document.createElement("textarea");
          helper.value = value;
          helper.setAttribute("readonly", "");
          helper.style.position = "fixed";
          helper.style.opacity = "0";
          document.body.appendChild(helper);
          helper.select();
          document.execCommand("copy");
          helper.remove();
        }
        button.classList.add("copied");
        button.setAttribute("aria-label", "已複製 Game ID");
        setTimeout(() => {
          button.classList.remove("copied");
          button.setAttribute("aria-label", `複製 ${value}`);
        }, 1200);
      } catch (error) {
        button.setAttribute("aria-label", "複製失敗");
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      activeAggregator = form.elements.currentAggregator.value;
      renderAggregatorPanel();
      applyFilters();
    });

    document.getElementById("moreToggle").addEventListener("click", (event) => {
      const button = event.currentTarget;
      const panel = document.getElementById("moreFilters");
      const expanded = button.getAttribute("aria-expanded") === "true";
      button.setAttribute("aria-expanded", String(!expanded));
      panel.hidden = expanded;
    });

    document.getElementById("toggleFilters").addEventListener("click", (event) => {
      const button = event.currentTarget;
      const panel = document.getElementById("filterPanel");
      const expanded = button.getAttribute("aria-expanded") === "true";
      button.setAttribute("aria-expanded", String(!expanded));
      panel.hidden = expanded;
    });

    document.getElementById("resetFilters").addEventListener("click", resetFilters);
    document.getElementById("clearApplied").addEventListener("click", resetFilters);

    document.getElementById("sortUpdated").addEventListener("click", () => {
      sortDescending = !sortDescending;
      applyFilters();
    });

    document.getElementById("openAggregatorSwitch").addEventListener("click", openAggregatorSwitchModal);
    document.getElementById("closeAggregatorSwitch").addEventListener("click", closeAggregatorSwitchModal);
    aggregatorSwitchBackdropEl.addEventListener("click", closeAggregatorSwitchModal);
    aggregatorSwitchFormEl.addEventListener("submit", applyAggregatorSwitch);
    document.getElementById("resetAggregatorSwitch").addEventListener("click", () => {
      aggregatorSwitchFormEl.reset();
      aggregatorSwitchNameEl.value = "";
    });

    document.getElementById("openCreateGame").addEventListener("click", openCreateGameModal);
    document.getElementById("closeCreateGame").addEventListener("click", closeCreateGameModal);
    createGameBackdropEl.addEventListener("click", closeCreateGameModal);
    createGameFormEl.addEventListener("submit", createGameFromForm);
    createGameFormEl.elements.gameId.addEventListener("input", () => {
      createGameFormEl.elements.gameId.setCustomValidity("");
    });

    chipsEl.addEventListener("click", (event) => {
      const button = event.target.closest("[data-remove-filter]");
      if (!button) return;
      const control = form.elements[button.dataset.removeFilter];
      if (control) {
        control.value = "";
        applyFilters();
      }
    });

    rowsEl.addEventListener("click", (event) => {
      const copyButton = event.target.closest("[data-copy-id]");
      if (copyButton) {
        copyGameId(copyButton);
        return;
      }

      const platformButton = event.target.closest("[data-open-platforms]");
      if (platformButton) {
        openPlatformDrawer(platformButton.dataset.openPlatforms);
        return;
      }

      const exposureButton = event.target.closest("[data-open-exposure]");
      if (exposureButton) {
        openExposureDrawer(exposureButton.dataset.openExposure);
        return;
      }

      const editButton = event.target.closest("[data-open-edit]");
      if (editButton) {
        openEditDrawer(editButton.dataset.openEdit);
        return;
      }

      const detailButton = event.target.closest("[data-open-detail]");
      if (detailButton) {
        openDrawer(detailButton.dataset.openDetail);
      }
    });

    rowsEl.addEventListener("change", (event) => {
      const checkbox = event.target.closest(".row-check");
      if (!checkbox) return;
      if (checkbox.checked) {
        selectedIds.add(checkbox.dataset.id);
      } else {
        selectedIds.delete(checkbox.dataset.id);
      }
      updateSelectionState();
    });

    selectAllEl.addEventListener("change", () => {
      const visibleIds = filteredGames.map((game) => game.id);
      if (selectAllEl.checked) {
        visibleIds.forEach((id) => selectedIds.add(id));
      } else {
        visibleIds.forEach((id) => selectedIds.delete(id));
      }
      renderRows();
    });

    drawerEditButtonEl.addEventListener("click", () => {
      if (drawerEditButtonEl.dataset.editId) {
        openEditDrawer(drawerEditButtonEl.dataset.editId);
      }
    });

    drawerBodyEl.addEventListener("click", (event) => {
      const cancelButton = event.target.closest("[data-cancel-edit]");
      if (cancelButton) {
        openDrawer(cancelButton.dataset.cancelEdit);
      }
    });

    drawerBodyEl.addEventListener("submit", (event) => {
      if (event.target.id !== "editGameForm") return;
      event.preventDefault();
      saveEditedGame(event.target);
    });

    document.getElementById("closeDrawer").addEventListener("click", closeDrawer);
    drawerBackdropEl.addEventListener("click", closeDrawer);
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeDrawer();
        closeCreateGameModal();
        closeAggregatorSwitchModal();
      }
    });

    initializeOptions();
    fillCreateAgentOptions();
    fillAggregatorSwitchOptions();
    renderMetrics();
    renderAggregatorPanel();
    applyFilters();
  </script>
</body>
</html>
