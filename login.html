<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SYSTEM 登入</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f8;
      --surface: #ffffff;
      --line: #dce3ea;
      --line-strong: #c7d1dc;
      --text: #172121;
      --muted: #6a747e;
      --blue: #5961cf;
      --blue-strong: #4852bd;
      --red: #b42318;
      --red-soft: #fff0ed;
      --shadow: 0 18px 48px rgba(23, 33, 33, 0.14);
      --radius: 8px;
      --font: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      font-family: var(--font);
      letter-spacing: 0;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
    }

    button,
    input {
      font: inherit;
      letter-spacing: 0;
    }

    .login-shell {
      width: min(100%, 420px);
    }

    .brand {
      margin-bottom: 18px;
      color: #5867d8;
      font-size: 40px;
      font-weight: 900;
      line-height: 1;
      text-align: center;
    }

    .login-card {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .login-head {
      margin-bottom: 22px;
      text-align: center;
    }

    .login-head h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.3;
    }

    .login-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .field label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .field input {
      width: 100%;
      min-height: 40px;
      padding: 8px 10px;
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .field input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(89, 97, 207, 0.14);
    }

    .error {
      display: none;
      margin: 0 0 14px;
      padding: 10px 12px;
      border: 1px solid #f1b5ad;
      border-radius: 6px;
      background: var(--red-soft);
      color: var(--red);
      font-size: 13px;
      font-weight: 800;
    }

    .error.is-visible {
      display: block;
    }

    .login-button {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--blue);
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }

    .login-button:hover {
      background: var(--blue-strong);
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <div class="brand">SYSTEM</div>
    <section class="login-card" aria-label="登入">
      <div class="login-head">
        <h1>管理後台登入</h1>
        <p>請輸入指定帳號與密碼</p>
      </div>
      <form id="loginForm">
        <div class="field">
          <label for="account">帳號</label>
          <input id="account" name="account" autocomplete="username" required autofocus>
        </div>
        <div class="field">
          <label for="password">密碼</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <p class="error" id="loginError">帳號或密碼不正確</p>
        <button class="login-button" type="submit">登入</button>
      </form>
    </section>
  </main>

  <script>
    const allowedPages = new Set(["index.html", "game-list.html", "game-lobby-list.html", "member-account.html", "member-wallet.html"]);
    const params = new URLSearchParams(location.search);
    const next = allowedPages.has(params.get("next")) ? params.get("next") : "index.html";

    if (sessionStorage.getItem("systemAdminAuthenticated") === "true") {
      location.replace(next);
    }

    document.getElementById("loginForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const account = event.currentTarget.elements.account.value.trim();
      const password = event.currentTarget.elements.password.value.trim();
      const error = document.getElementById("loginError");

      if (account === "830606" && password === "830606") {
        sessionStorage.setItem("systemAdminAuthenticated", "true");
        location.replace(next);
        return;
      }

      error.classList.add("is-visible");
      event.currentTarget.elements.password.value = "";
      event.currentTarget.elements.password.focus();
    });
  </script>
</body>
</html>
